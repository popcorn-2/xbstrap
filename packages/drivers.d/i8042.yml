packages:
  - name: "@driver/i8042"
    git: 'https://github.com/popcorn-2/i8042.git'
    system: true
    build-depends:
      - "@dev/rustc:cargo"
      - "@dev/llvm:clang,lld"
    depends:
      - "@core/devman"
    post-install:
      - '@core/devman:update-registry'
    build: >
      env RUSTC={BINDEP:@dev/rustc}/bin/rustc
      {BINDEP:@dev/rustc}/bin/cargo
      rustc
      --target {TARGET}
      --target-dir .
      --manifest-path {SOURCES}/Cargo.toml
      --release
      --
      -C linker={BINDEP:@dev/llvm}/bin/clang
      -C link-args=--target={TARGET}
      -C link-args=--sysroot={BASE_SYSROOT}
      -C panic=abort
    install:
      - mkdir -p {SYSROOT}/drivers
      - install {TARGET}/release/i8042.exec {SYSROOT}/drivers/i8042.exec
