sources:
  - name: pci
    git: 'https://github.com/popcorn-2/pci.git'

packages:
  - name: pci
    source: pci
    require-tools:
      - rust
      - llvm
      - devman-update-registry
    build: >
      env RUSTC=@@TOOLCHAIN@@/bin/rustc
      @@TOOLCHAIN@@/bin/cargo rustc
      --target @@TRIPLE@@
      --target-dir .
      --manifest-path @@SOURCES@@/Cargo.toml
      --release
      --
      -C linker=@@TOOLCHAIN@@/bin/clang
      -C link-arg=--target=@@TRIPLE@@
      -C link-arg=--sysroot=@@SYSROOT@@
      -C panic=abort
      -C target-feature=+crt-static
    # -C target-cpu=native
    install:
      - mkdir -p @@INSTALL_DIR@@/driver/
      - install @@TRIPLE@@/release/pci.exec @@INSTALL_DIR@@/driver/pci.exec
      - '@@TOOLCHAIN@@/system/bin/update-driver-registry @@SYSROOT@@'
