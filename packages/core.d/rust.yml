packages:
  - name: "@dev/rustc"
    git: 'https://github.com/popcorn-2/rust.git'
    build-depends:
      - "@dev/llvm:clang,lld"
    features:
      - cargo
      - rustdoc
      - clippy
      - docs
    configure: |
      cat <<'EOF' > config.toml
      profile = "compiler"  # Includes one of the default files in src/bootstrap/defaults
      change-id = 154587

      [llvm]
      download-ci-llvm = true

      [rust]
      channel = "nightly"
      codegen-tests = false
      lld = true

      [build]
      host = ["{HOST}"]
      target = ["x86_64-unknown-popcorn", "{HOST}"] # we don't bother building the uefi target since it's only used by one crate and we can use build-std instead
      description = "Popcorn2"
      docs = {NOFEAT:docs:false}{FEAT:docs:true}
      compiler-docs = false
      extended = true
      tools = [
              "src",
              {FEAT:cargo:"cargo",}
              {FEAT:rustdoc:"rustdoc",}
              {FEAT:clippy:"clippy",}
              #{FEAT:miri:"miri",}
              #{FEAT:cargo-miri:"cargo-miri",}
      ]

      [dist]
      compression-formats = ["gz"]

      [install]
      prefix = "{SYSROOT}"
      sysconfdir = "{SYSROOT}/etc"

      [target.x86_64-unknown-popcorn]
      cc = "{BINDEP:@dev/llvm}/bin/clang"
      cxx = "{BINDEP:@dev/llvm}/bin/clang++"
      ar = "{BINDEP:@dev/llvm}/bin/llvm-ar"
      ranlib = "{BINDEP:@dev/llvm}/bin/llvm-ranlib"
      linker =  "{BINDEP:@dev/llvm}/bin/clang"
      llvm-config = "{BINDEP:@dev/llvm}/bin/llvm-config"
      crt-static = true
      EOF
    build:
      - '{SOURCES}/x.py build --config config.toml'
      #- '{SOURCES}/x.py dist rust-src --config config.toml' # we need this for build-std
    install:
      - '{SOURCES}/x.py install --config config.toml'
      #- 'tar -xf build/dist/rust-src-nightly.tar.gz --strip-components=2 -C {SYSROOT}'
