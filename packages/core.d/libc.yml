sources:
  - name: mlibc
    git: 'https://github.com/popcorn-2/mlibc.git'

packages:
  - name: "@core/libc"
    git: 'https://github.com/popcorn-2/mlibc.git'
    system: true
    features:
      - headers
      - lib
      - posix
    build-dep:
      - "@dev/llvm"
    depends:
      - "{FEAT:lib:@core/compiler-rt-builtins}"
    configure: |
      meson \
      setup \
      {SOURCES} \
        -Ddefault_library=static \
        -Dglibc_option=disabled \
        -Dbsd_option=disabled \
        -Dposix_option={FEAT:posix:enabled}{NOFEAT:posix:disabled} \
        -Dlibgcc_dependency=false \
        --prefix=/ \
        {NOFEAT:lib:-Dheaders_only=true} \
        {FEAT:lib:-Dheaders_only=false} \
        {NOFEAT:headers:-Dno_headers=true} \
        {FEAT:headers:-Dno_headers=false} \
        -Duse_freestnd_hdrs=enabled \
        --cross-file=<(cat <<'EOF'
      [binaries]
      c = ['{BINDEP:@dev/llvm}/bin/clang', '--target={TARGET}', '--sysroot={BASE_SYSROOT}']
      cpp = ['{BINDEP:@dev/llvm}/bin/clang++', '--target={TARGET}', '--sysroot={BASE_SYSROOT}']
      llvm-config = ['{BINDEP:@dev/llvm}/bin/llvm-config']
      ar = ['{BINDEP:@dev/llvm}/bin/llvm-ar']
      ranlib = ['{BINDEP:@dev/llvm}/bin/llvm-ranlib']

      [properties]
      needs_exe_wrapper = true

      [host_machine]
      system = 'popcorn'
      cpu_family = 'x86_64'
      cpu = 'x86_64'
      endian = 'little'
      EOF
      )
    install: DESTDIR={SYSROOT} ninja install
  
  - name: libc
    source: mlibc
    require-tools:
      - llvm
    configure: >
      meson
      setup
      @@SOURCES@@
      -Ddefault_library=static
      -Dglibc_option=disabled
      -Dbsd_option=disabled
      -Dposix_option=enabled
      -Dlibgcc_dependency=false
      --prefix=/system
      -Dno_headers=true
      -Duse_freestnd_hdrs=enabled
      --cross-file=@@CONFIG@@/meson/popcorn.cross-file
    build: ninja
    install: DESTDIR=@@SYSROOT@@ ninja install
