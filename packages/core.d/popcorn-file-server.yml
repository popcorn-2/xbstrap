sources:
  - name: popcorn-file-server
    git: 'https://github.com/popcorn-2/file-server.git'

packages:
  - name: file-server
    source: popcorn-file-server
    type: system
    require-tools:
      - rust
      - llvm
    build: >
      env RUSTC=@@TOOLCHAIN@@/bin/rustc
      @@TOOLCHAIN@@/bin/cargo rustc
      --target @@TRIPLE@@
      --target-dir .
      --manifest-path @@SOURCES@@/Cargo.toml
      --release
      --
      -C linker=@@TOOLCHAIN@@/bin/clang
      -C link-arg=--target=@@TRIPLE@@
      -C link-arg=--sysroot=@@SYSROOT@@
      -C panic=abort
      -C target-feature=+crt-static
    # -C target-cpu=native
    install:
      - mkdir -p @@INSTALL_DIR@@/bin/
      - install @@TRIPLE@@/release/file-server.exec @@INSTALL_DIR@@/bin/file-server.exec
