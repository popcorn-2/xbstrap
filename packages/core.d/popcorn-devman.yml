sources:
  - name: popcorn-devman
    git: 'https://github.com/popcorn-2/devman.git'

packages:
  - name: devman
    source: popcorn-devman
    require-tools:
      - rust
      - llvm
    build: >
      env RUSTC=@@TOOLCHAIN@@/system/bin/rustc
      @@TOOLCHAIN@@/system/bin/cargo build
      --target @@TRIPLE@@
      --target-dir .
      --manifest-path @@SOURCES@@/Cargo.toml
      --release
      -C linker=@@TOOLCHAIN@@/system/bin/clang
      -C link-arg=--target=@@TRIPLE@@
      -C link-arg=--sysroot=@@SYSROOT@@
      -C panic=abort
      -C target-feature=+crt-static
    # -C target-cpu=native
    install:
      - mkdir -p @@SYSROOT@@/system/bin/
      - install @@TRIPLE@@/release/devman.exec @@SYSROOT@@/system/bin/devman.exec

  - name: devman-update-registry
    source: popcorn-devman
    install:
      - install @@SOURCES@@/update-driver-registry @TOOLCHAIN@@/system/bin/update-driver-registry

tools:
  - name: devman-update-registry
    source: popcorn-devman
    install:
      - install @@SOURCES@@/update-driver-registry @TOOLCHAIN@@/system/bin/update-driver-registry
