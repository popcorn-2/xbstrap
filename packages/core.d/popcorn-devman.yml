sources:
  - name: popcorn-devman
    git: 'https://github.com/popcorn-2/devman.git'

packages:
  - name: devman
    source: popcorn-devman
    type: system
    require-tools:
      - rust
      - llvm
    build: >
      env RUSTC=@@TOOLCHAIN@@/bin/rustc
      @@TOOLCHAIN@@/bin/cargo rustc
      --target @@TRIPLE@@
      --target-dir .
      --manifest-path @@SOURCES@@/Cargo.toml
      --release
      --
      -C linker=@@TOOLCHAIN@@/bin/clang
      -C link-arg=--target=@@TRIPLE@@
      -C link-arg=--sysroot=@@SYSROOT@@
      -C panic=abort
      -C target-feature=+crt-static
    # -C target-cpu=native
    install:
      - mkdir -p @@INSTALL_DIR@@/bin/
      - install @@TRIPLE@@/release/devman.exec @@INSTALL_DIR@@/bin/devman.exec

  - name: devman-update-registry
    source: popcorn-devman
    type: system
    install:
      - mkdir -p @@INSTALL_DIR@@/bin/
      - install @@SOURCES@@/update-driver-registry @@INSTALL_DIR@@/bin/update-driver-registry

tools:
  - name: devman-update-registry
    source: popcorn-devman
    install:
      - mkdir -p @@TOOLCHAIN@@/bin/
      - install @@SOURCES@@/update-driver-registry @@TOOLCHAIN@@/bin/update-driver-registry
