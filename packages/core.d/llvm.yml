packages:
  - name: "@dev/llvm"
    git: 'https://github.com/popcorn-2/llvm-project.git'
    binary-url: 'https://github.com/popcorn-2/llvm-project/releases/download/latest/{SAFE_NAME}{FEATURES}-{TARGET}.tar.gz'
    license: 'Apache-2.0 WITH LLVM-exception'
    author:
      - 'LLVM Project'
      - 'Eliyahu Gluschove-Koppel <egkoppel@eliyahu.co.uk>'
    maintainer:
      - 'Eliyahu Gluschove-Koppel <egkoppel@eliyahu.co.uk>'
    features:
      - clang:
        - extra-tools
      - lld
    configure: >
      cmake
      -G Ninja
      -B .
      -D LLVM_ENABLE_PROJECTS="{FEAT:clang:clang;}{FEAT:clang-extra-tools:clang-tools-extra;}{FEAT:lld:lld;}"
      -D LLVM_ENABLE_RUNTIMES=""
      -D BUILD_SHARED_LIBS=OFF
      -D CLANG_DEFAULT_CXX_STDLIB="libc++"
      -D CLANG_DEFAULT_LINKER=lld
      -D CLANG_DEFAULT_OBJCOPY=llvm-objcopy
      -D CLANG_DEFAULT_RTLIB=compiler-rt
      -D CLANG_DEFAULT_UNWINDLIB=libunwind
      -D LLVM_TARGETS_TO_BUILD="Native;X86"
      -D CMAKE_BUILD_TYPE=RelWithDebInfo
      -D CMAKE_C_FLAGS_RELWITHDEBINFO="-O3 -gline-tables-only -DNDEBUG"
      -D CMAKE_CXX_FLAGS_RELWITHDEBINFO="-O3 -gline-tables-only -DNDEBUG"
      -D LLVM_ENABLE_LTO=OFF
      -D PACKAGE_VENDOR=Popcorn2
      -D CMAKE_OSX_ARCHITECTURES=x86_64
      -D LLVM_INSTALL_TOOLCHAIN_ONLY=ON
      -D LLVM_TOOLCHAIN_TOOLS="dsymutil;llvm-cov;llvm-dwarfdump;llvm-profdata;llvm-objdump;llvm-nm;llvm-size;llvm-cxxfilt;llvm-config;llvm-ar;llvm-ranlib"
      -D LLVM_DISTRIBUTION_COMPONENTS="{FEAT:clang:clang;LTO;}{FEAT:lld:lld;}dsymutil;llvm-cov;llvm-dwarfdump;llvm-profdata;llvm-objdump;llvm-nm;llvm-size;llvm-cxxfilt;llvm-config;llvm-ar;llvm-ranlib"
      {SOURCES}/llvm
    build:
      - cmake --build . --target distribution
    install:
      - DESTDIR={SYSROOT} cmake --install . --strip --prefix=/

  - name: "@core/compiler-rt-builtins"
    source: "@dev/llvm"
    #binary-url: 'https://github.com/popcorn-2/llvm-project/releases/download/nightly-2026-05-20/{SAFE_NAME}{FEATURES}-{TARGET}.tar.gz'
    license: 'Apache-2.0 WITH LLVM-exception'
    author:
      - 'LLVM Project'
      - 'Eliyahu Gluschove-Koppel <egkoppel@eliyahu.co.uk>'
    maintainer:
      - 'Eliyahu Gluschove-Koppel <egkoppel@eliyahu.co.uk>'
    build-depends:
      - "@dev/llvm"
    depends:
      - "@core/libc:headers,posix"
    configure: >
      cmake
      -G Ninja
      -B .
      -D CMAKE_BUILD_TYPE=RelWithDebInfo
      -D CMAKE_C_COMPILER={BINDEP:@dev/llvm}/bin/clang
      -D CMAKE_CXX_COMPILER={BINDEP:@dev/llvm}/bin/clang++
      -D CMAKE_ASM_COMPILER={BINDEP:@dev/llvm}/bin/clang
      -D CMAKE_AR={BINDEP:@dev/llvm}/bin/llvm-ar
      -D CMAKE_NM={BINDEP:@dev/llvm}/bin/llvm-nm
      -D CMAKE_RANLIB={BINDEP:@dev/llvm}/bin/llvm-ranlib
      -D CMAKE_C_COMPILER_TARGET={TARGET}
      -D CMAKE_CXX_COMPILER_TARGET={TARGET}
      -D CMAKE_ASM_COMPILER_TARGET={TARGET}
      -D CMAKE_SYSTEM_NAME=Popcorn
      -D COMPILER_RT_BUILD_BUILTINS=ON
      -D COMPILER_RT_BUILD_LIBFUZZER=OFF
      -D COMPILER_RT_BUILD_MEMPROF=OFF
      -D COMPILER_RT_BUILD_PROFILE=OFF
      -D COMPILER_RT_BUILD_SANITIZERS=OFF
      -D COMPILER_RT_BUILD_XRAY=OFF
      -D COMPILER_RT_DEFAULT_TARGET_ONLY=ON
      -D CMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY
      {SOURCES}/compiler-rt/lib/builtins
    build:
      - cmake --build .
    install:
      - DESTDIR={SYSROOT} cmake --install . --strip --prefix=/

  - name: "@core/llvm-runtimes"
    source: "@dev/llvm"
    #binary-url: 'https://github.com/popcorn-2/llvm-project/releases/download/nightly-2026-05-20/{SAFE_NAME}{FEATURES}-{TARGET}.tar.gz'
    license: 'Apache-2.0 WITH LLVM-exception'
    author:
      - 'LLVM Project'
      - 'Eliyahu Gluschove-Koppel <egkoppel@eliyahu.co.uk>'
    maintainer:
      - 'Eliyahu Gluschove-Koppel <egkoppel@eliyahu.co.uk>'
    build-depends:
      - "@dev/llvm"
    depends:
      - "@core/compiler-rt-builtins"
      - "@core/libc"
    features:
      - cxx:
        - exceptions
        - rtti
      - compiler-rt:
        - sanitizers
        - profile
    configure: >
      cmake
      -G Ninja
      -B .
      -D CMAKE_BUILD_TYPE=RelWithDebInfo
      -D CMAKE_C_COMPILER={BINDEP:@dev/llvm}/bin/clang
      -D CMAKE_CXX_COMPILER={BINDEP:@dev/llvm}/bin/clang++
      -D CMAKE_C_COMPILER_TARGET={TARGET}
      -D CMAKE_CXX_COMPILER_TARGET={TARGET}
      -D CMAKE_SYSTEM_NAME=Popcorn
      -D CMAKE_SYSROOT={BASE_SYSROOT}
      -D LLVM_ENABLE_RUNTIMES="libunwind;libcxxabi;libcxx;compiler-rt"
      -D LIBCXX_ENABLE_EXCEPTIONS={FEAT:cxx-exceptions:ON}{NOFEAT:cxx-exceptions:OFF}
      -D LIBCXX_ENABLE_RTTI={FEAT:cxx-rtti:ON}{NOFEAT:cxx-rtti:OFF}
      -D LIBCXX_CXX_ABI=libcxxabi
      -D LIBCXX_USE_COMPILER_RT=ON
      -D LIBCXXABI_USE_COMPILER_RT=ON
      -D LIBCXXABI_USE_LLVM_UNWINDER=ON
      -D LIBUNWIND_USE_COMPILER_RT=ON
      -D COMPILER_RT_BUILD_BUILTINS=OFF
      -D COMPILER_RT_BUILD_SANITIZERS={FEAT:compiler-rt-sanitizers:ON}{NOFEAT:compiler-rt-sanitizers:OFF}
      -D COMPILER_RT_BUILD_PROFILE={FEAT:compiler-rt-profile:ON}{NOFEAT:compiler-rt-profile:OFF}
      {SOURCES}/runtimes
    build:
      - cmake --build .
    install:
      - DESTDIR={SYSROOT} cmake --install . --strip --prefix=/