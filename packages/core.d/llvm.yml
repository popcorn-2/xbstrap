sources:
  - name: llvm
    git: 'https://github.com/popcorn-2/llvm-project.git'

tools:
  - name: llvm
    source: llvm
    type: system
    depends:
      - libc-headers
    configure: >
      cmake
      -G Ninja
      -B .
      -C @@CONFIG@@/cmake/popcorn-host.cmake
      @@SOURCES@@/llvm
    build:
      - ninja
    install:
      - DESTDIR=@@TOOLCHAIN@@ ninja install-distribution-stripped
      - DESTDIR=@@TOOLCHAIN@@ ninja install-builtins-stripped
      - DESTDIR=@@INSTALL_DIR@@ ninja install-runtimes-stripped
