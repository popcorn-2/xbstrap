packages:
  - name: "@core/kernel"
    git:
      source: 'https://github.com/popcorn-2/popcorn-2.git'
      recursive: true
    system: true
    features:
      - kasan
    build-depends:
      - "@dev/rustc:cargo,src"
      - "@dev/llvm:clang,lld"
    depends:
      - "@core/bootloader:{FEAT:kasan:kasan}"
    commands:
      cargo: >
        env RUSTFLAGS='-C target-feature=-crt-static -C symbol-mangling-version=v0 --cfg=kernel_version="0.1.0" {FEAT:kasan:--cfg=kasan -Z sanitizer=kernel-address -C llvm-args=-asan-mapping-offset=0xdfffd00000000000 -C llvm-args=-asan-use-stack-safety=0}' PATH={BINDEP:@dev/rustc}/bin:$HOME/.cargo/bin:$PATH
        cargo
        {CMD_ARGS:0}
        --target {TARGET}
        --target-dir .
        --manifest-path {SOURCES}/Cargo.toml
        -Z build-std=compiler_builtins,core,alloc
        -Z build-std-features=compiler-builtins-mem
        {FEAT:kasan:--features=kasan}
        {CMD_ARGS:1..}
    build: >
      cargo
      rustc
      -p kernel
      --release
      --
      -C linker={BINDEP:@dev/llvm}/bin/clang
      -C link-args=--target={TARGET}
      -C link-args=--sysroot={BASE_SYSROOT}
      -C link-args=-nostartfiles
      -C link-args=-Wl,-no-pie
      -C link-args=-Wl,-T{SOURCES}/kernel/src/hal/arch/{TARGET:arch_alt}/linker.ld
      -C code-model=kernel
      -C relocation-model=static
      -C panic=unwind
      -C no-redzone=yes
      -C target-feature=-sse3,-ssse3,-sse4.1,-sse4.2,-avx,-avx2
      -Z tls-model=local-exec
    install:
      - mkdir -p {BASE_SYSROOT}/efi/EFI/boot/
      - install {TARGET}/release/kernel.exec {BASE_SYSROOT}/efi/EFI/boot/kernel.exec

  - name: "@core/bootloader"
    source: "@core/kernel"
    system: true
    features:
      - kasan
    build-depends:
      - "@dev/rustc:cargo,src"
    commands:
      cargo: >
        env RUSTC={BINDEP:@dev/rustc}/bin/rustc RUSTFLAGS='-C symbol-mangling-version=v0 --cfg=kernel_version="0.1.0"' CARGO={BINDEP:@dev/rustc}/bin/cargo
        {BINDEP:@dev/rustc}/bin/cargo-{CMD_ARGS:0}
        {CMD_ARGS:0}
        -p bootloader
        --target {TARGET:arch}-unknown-uefi
        --target-dir .
        --manifest-path {SOURCES}/Cargo.toml
        -Z build-std=core,alloc
        {FEAT:kasan:--features=kasan}
        {CMD_ARGS:1..}
    build: >
      env RUSTC={BINDEP:@dev/rustc}/bin/rustc
      {BINDEP:@dev/rustc}/bin/cargo build
      -p bootloader
      --target {TARGET:arch}-unknown-uefi
      --target-dir .
      --manifest-path {SOURCES}/Cargo.toml
      --release
      -Z build-std=core,alloc
      {FEAT:kasan:--features=kasan}
    install:
      - mkdir -p {BASE_SYSROOT}/efi/EFI/boot/
      - mkdir -p {BASE_SYSROOT}/efi/EFI/POPCORN/
      - install {TARGET:arch}-unknown-uefi/release/bootloader.efi {BASE_SYSROOT}/efi/EFI/boot/bootx64.efi
      - touch {BASE_SYSROOT}/efi/EFI/POPCORN/config.toml
