packages:
  - name: "@core/devman"
    git: 'https://github.com/popcorn-2/devman.git'
    system: true
    triggers:
      - update-registry: '{SYSROOT}/bin/update-driver-registry'
    build-depends:
      - "@dev/rustc:cargo"
      - "@dev/llvm:clang,lld"
    build: >
      env RUSTC={BINDEP:@dev/rustc}/bin/rustc
      {BINDEP:@dev/rustc}/bin/cargo
      rustc
      --target {TARGET}
      --target-dir .
      --manifest-path {SOURCES}/Cargo.toml
      --release
      --
      -C linker={BINDEP:@dev/llvm}/bin/clang
      -C link-args=--target={TARGET}
      -C link-args=--sysroot={BASE_SYSROOT}
      -C panic=abort
    install:
      - mkdir -p {SYSROOT}/bin
      - install {TARGET}/release/devman.exec {SYSROOT}/bin/devman.exec
      - install {SOURCES}/update-driver-registry {SYSROOT}/bin/update-driver-registry
