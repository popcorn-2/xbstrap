packages:
  - name: pipc
    source: popcorn-pipc
    require-tools:
      - rust
      - llvm
    build: >
      env RUSTC=@@TOOLCHAIN@@/system/bin/rustc
      @@TOOLCHAIN@@/system/bin/cargo rustc
      --target @@TRIPLE@@
      --target-dir .
      --manifest-path @@SOURCES@@/Cargo.toml
      --release
      --
      -C linker=@@TOOLCHAIN@@/system/bin/clang
      -C link-arg=--target=@@TRIPLE@@
      -C link-arg=--sysroot=@@SYSROOT@@
      -C panic=abort
      -C target-feature=+crt-static
    # -C target-cpu=native
    install:
      - mkdir -p @@SYSROOT@@/pkg/pipc/bin/
      - install @@TRIPLE@@/release/pipc.exec @@SYSROOT@@/pkg/pipc/bin/pipc.exec
