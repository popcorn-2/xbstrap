profile = "compiler"  # Includes one of the default files in src/bootstrap/defaults
change-id = 154587

[llvm]
download-ci-llvm = true

[rust]
channel = "nightly"
codegen-tests = false
lld = true

[build]
host = [
        "@@HOST@@"
]
target = ["x86_64-unknown-popcorn", "@@HOST@@"] # we don't bother building the uefi target since it's only used by one crate and we can use build-std instead
description = "Popcorn2"
docs = false
compiler-docs = false
extended = true
tools = [
        "cargo",
        "rustdoc",
        #"miri",
        #"cargo-miri"
]

[dist]
compression-formats = ["gz"]

[install]
prefix = "@@TOOLCHAIN@@/"
sysconfdir = "@@TOOLCHAIN@@/etc"

[target.x86_64-unknown-popcorn]
cc = "@@TOOLCHAIN@@/bin/clang"
cxx = "@@TOOLCHAIN@@/bin/clang++"
ar = "@@TOOLCHAIN@@/bin/llvm-ar"
ranlib = "@@TOOLCHAIN@@/bin/llvm-ranlib"
linker =  "@@TOOLCHAIN@@/bin/clang"
llvm-config = "@@TOOLCHAIN@@/bin/llvm-config"
crt-static = true
